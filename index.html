<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Link Safety Checker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg text-center glass-card">
        <h2 class="mb-3">🔗 Link Safety Checker</h2>

        <input type="text" id="urlInput" class="form-control mb-3" placeholder="Enter URL (https://example.com)">

        <button class="btn btn-primary w-100" onclick="checkLink()">Check Link</button>

        <div id="loading" class="mt-3 d-none">
            <div class="spinner-border text-light"></div>
        </div>

        <div id="result" class="mt-3"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
